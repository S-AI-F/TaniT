<header class="masthead"><div class="masthead-brand"><img src="assets/tanit-logo.svg" alt="TaniT" class="masthead-logo"><h1>TaniT</h1></div>

  </nav>
</header>
<main>
  <div class="filters" id="filters"></div>
  <ul class="feed" id="feed"></ul>
</main>
<script>
const ARTICLES = [{
  "title": "Tunisia leads North Africa in AI use, Anthropic data shows",
  "url": "articles/tunisia-ai-opportunity/index.html",
  "date": "July 2026",
  "excerpt": "Tunisia uses AI about 40% more intensively than its economy would predict, first in North Africa. Without a state willing to back that head start, it will be exported along with the talent.",
  "tags": ["AI", "Tunisia", "Labor Markets", "Economics", "Policy"]
},
{"title": "After Retrieval", "url": "articles/after-retrieval/index.html", "date": "7 June 2026", "excerpt": "What schools and jobs become when knowledge is inferable. A short history of where knowledge has lived, from cave paintings to large language models.", "tags": ["AI", "LLMs", "Knowledge", "Education", "Epistemology", "Philosophy"]}, 
{"title": "The Compute Question", "url": "articles/the-compute-question/index.html", "date": "4 June 2026", "excerpt": "AI is becoming a geopolitical question. It runs on chips, inside buildings, powered by electricity \u2014 and whoever controls those things controls the future.", "tags": ["AI Infrastructure", "Geopolitics", "Data Centers", "Energy", "GPUs"]}, 
{"title": "The Blurry Space", "url": "articles/the-blurry-space/index.html", "date": "2 June 2026", "excerpt": "A decade between data science, code, and product \u2014 and how AI quietly turned that intersection into a place anyone can stand.", "tags": ["AI", "LLMs", "Product Management", "Machine Learning", "Open Source", "Symbolic AI"]},
{
  "title": "The AI Transition Capacity Index",
  "url": "articles/ai-transition-capacity-index/index.html",
  "date": "June 2026",
  "excerpt": "Single-number forecasts of AI job loss say little about any specific country. A two-axis method, exposure against Transition Capacity, does better.",
  "tags": ["AI", "Labor Markets", "Economics", "Policy"]
},
{
  "title": "Is your company AI ready?",
  "url": "articles/is-your-company-ai-ready/index.html",
  "date": "June 2026",
  "excerpt": "Score the AI Transition Capacity of your company, read your arechtype, and find where AI automates, augments and where training matters most.",
  "tags": ["AI", "Labor Markets", "Economics", "Policy"]
}];
const allTags = [...new Set(ARTICLES.flatMap(a => a.tags))].sort();
let active = new Set();

function renderFilters(){
  const f = document.getElementById('filters');
  f.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (active.size===0 ? ' active' : '');
  all.textContent = 'All';
  all.onclick = () => { active.clear(); render(); };
  f.appendChild(all);
  allTags.forEach(t => {
    const b = document.createElement('button');
    b.className = 'chip' + (active.has(t) ? ' active' : '');
    b.textContent = t;
    b.onclick = () => { active.has(t) ? active.delete(t) : active.add(t); render(); };
    f.appendChild(b);
  });
}

function renderFeed(){
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  const list = ARTICLES.filter(a => active.size===0 || a.tags.some(t => active.has(t)));
  if(list.length===0){
    feed.innerHTML = '<li class="empty">No articles match these tags yet.</li>';
    return;
  }
  list.forEach(a => {
    const li = document.createElement('li');
    const tags = a.tags.map(t => '<span class="tag">'+t+'</span>').join('');
    li.innerHTML = '<a class="card" href="'+a.url+'">'
      + '<div class="card-meta">'+a.date+'</div>'
      + '<div class="card-title">'+a.title+'</div>'
      + '<p class="card-excerpt">'+a.excerpt+'</p>'
      + '<div class="card-tags">'+tags+'</div></a>';
    feed.appendChild(li);
  });
}
function render(){ renderFilters(); renderFeed(); }
render();
</script>
</div></body></html>
